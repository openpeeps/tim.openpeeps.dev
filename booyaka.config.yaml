metadata:
  logo: "https://raw.githubusercontent.com/openpeeps/tim/main/.github/timV2.png"
  logo_keep_gradient: true
  title: "Tim Engine Documentation"
  description: "Documentation page for Tim Engine - a powerful template engine and scripting language for developers."
  keywords: ["tim", "template", "templating", "template engine", "scripting language"]

appearance:
  show_theme_switcher: true
  default_theme: "system"
  show_toggle_left_sidebar: true
  show_toggle_right_sidebar: true
  container_width: "col-lg-10 mx-auto"
  content_width: "col-lg-7"
  background_noise_opacity: 0.3

git:
  enable_versioning: false
  enable_contributors_info: false

header:
  search:
    enable: true
    index_meta_data: true
    index_page_titles: true

content:
  allow_raw_html_tags:
    - "b"
    - "i"
    - "strong"
    - "em"
    - "a"
    - "p"
    - "ul"
    - "ol"
    - "li"

  show_last_updated: true
  last_date_updated_format: "yyyy-MM-dd HH:mm:ss"
  enable_auto_format_links: true
  bottom_navigation: true
  code_highlight_theme: "default"
  share_ai_buttons: true
